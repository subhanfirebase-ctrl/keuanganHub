<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>keuanganHub AI</title>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-canvas: #ffffff;
            --primary: #1e3a8a;
            --primary-light: #eff6ff;
            --accent: #10b981;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-main);
            /* dvh membuat tinggi layar otomatis menyusut pas di atas keyboard HP */
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .navbar {
            background-color: var(--bg-canvas);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .brand { font-weight: 700; font-size: 1.15rem; color: var(--primary); }
        .brand span { color: var(--accent); }

        .workspace { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: calc(100dvh - 56px); 
            position: relative; 
        }

        .chat-stream { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
        }

        .message-row { max-width: 800px; width: 100%; margin: 0 auto; display: flex; gap: 14px; }
        .avatar { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; flex-shrink: 0; }
        
        .user-row .avatar { background-color: #dbeafe; color: #1e40af; }
        .ai-row .avatar { background-color: var(--primary-light); color: var(--primary); border: 1px solid #bfdbfe; }
        
        .message-content { flex: 1; line-height: 1.6; font-size: 1rem; word-wrap: break-word; }
        .ai-row .message-content { white-space: pre-wrap; color: #1e293b; }

        .suggestions-container { max-width: 800px; width: 100%; margin: 40px auto 0 auto; display: grid; grid-template-columns: 1fr; gap: 10px; }
        .suggestion-card { background: var(--bg-primary); border: 1px solid var(--border); padding: 14px; border-radius: 10px; cursor: pointer; text-align: left; font-size: 0.95rem; font-weight: 500; color: #334155; }
        .suggestion-card:hover { border-color: var(--primary); background-color: var(--primary-light); }

        .input-panel { padding: 16px; flex-shrink: 0; background: var(--bg-canvas); border-top: 1px solid var(--border); }
        .input-container-wrapper { max-width: 800px; width: 100%; margin: 0 auto; }
        
        .input-bar-form { display: flex; border: 1px solid var(--border); border-radius: 12px; padding: 8px 12px; align-items: center; gap: 10px; background: var(--bg-canvas); }
        .input-bar-form input { flex: 1; border: none; outline: none; font-size: 1rem; padding: 6px 0; color: var(--text-main); }
        
        .send-button { background-color: var(--primary); color: white; border: none; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .send-button svg { width: 16px; height: 16px; fill: currentColor; }

        .error-banner { max-width: 800px; width: 100%; margin: 0 auto; background-color: #fef2f2; color: #991b1b; padding: 14px; border-radius: 10px; font-size: 0.95rem; }
        .loading-row { display: none; max-width: 800px; width: 100%; margin: 0 auto; gap: 14px; align-items: center; }
        .pulse-dot { width: 8px; height: 8px; background-color: var(--primary); border-radius: 50%; animation: pulse 1.4s infinite ease-in-out both; }
        .pulse-dot:nth-child(1) { animation-delay: -0.32s; }
        .pulse-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes pulse { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">keuangan<span>Hub</span> AI</div>
    </nav>
    <div class="workspace">
