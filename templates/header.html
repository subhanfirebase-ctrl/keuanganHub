<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Trik PWA agar Full Screen Tanpa Alamat Browser saat di-install di HP -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>keuanganHub AI — Ruang Analisis Finansial</title>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-canvas: #ffffff;
            --primary: #1e3a8a;
            --primary-light: #eff6ff;
            --accent: #10b981;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .navbar {
            background-color: var(--bg-canvas);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .brand { font-weight: 700; font-size: 1.25rem; color: var(--primary); }
        .brand span { color: var(--accent); }
        .workspace { flex: 1; display: flex; flex-direction: column; height: calc(100vh - 64px); position: relative; }
        .chat-stream { flex: 1; overflow-y: auto; padding: 30px 24px; display: flex; flex-direction: column; gap: 32px; }
        .message-row { max-width: 800px; width: 100%; margin: 0 auto; display: flex; gap: 20px; }
        .avatar { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; flex-shrink: 0; }
        .user-row .avatar { background-color: #dbeafe; color: #1e40af; }
        .ai-row .avatar { background-color: var(--primary-light); color: var(--primary); border: 1px solid #bfdbfe; }
        .message-content { flex: 1; line-height: 1.7; font-size: 1.05rem; word-wrap: break-word; }
        .ai-row .message-content { white-space: pre-wrap; }
        .suggestions-container { max-width: 800px; width: 100%; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-top: auto; }
        .suggestion-card { background: var(--bg-primary); border: 1px solid var(--border); padding: 16px; border-radius: 12px; cursor: pointer; text-align: left; }
        .suggestion-card:hover { border-color: var(--primary); background-color: var(--primary-light); }
        .input-panel { padding: 24px; flex-shrink: 0; background: #fff; }
        .input-container-wrapper { max-width: 800px; width: 100%; margin: 0 auto; }
        .input-bar-form { display: flex; border: 1px solid var(--border); border-radius: 16px; padding: 10px 14px; align-items: center; gap: 12px; }
        .input-bar-form input { flex: 1; border: none; outline: none; font-size: 1.05rem; }
        .send-button { background-color: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .error-banner { max-width: 800px; width: 100%; margin: 0 auto; background-color: #fef2f2; color: #991b1b; padding: 16px; border-radius: 12px; }
        .loading-row { display: none; max-width: 800px; width: 100%; margin: 0 auto; gap: 20px; }
        .pulse-dot { width: 10px; height: 10px; background-color: var(--primary); border-radius: 50%; animation: pulse 1.4s infinite ease-in-out both; }
        @keyframes pulse { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">keuangan<span>Hub</span></div>
    </nav>
    <div class="workspace">
